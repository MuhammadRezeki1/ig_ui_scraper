services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: rezeki1/ig-scraper-backend:latest
    container_name: ig-scraper-backend
    ports:
      - "8000:8000"
    environment:
      - FLASK_API_BASE=${FLASK_API_BASE}
      - ENGINE_PATH=${ENGINE_PATH}
      - API_PORT=${API_PORT}
      - API_HOST=${API_HOST}
      - GEMINI_ENABLED=${GEMINI_ENABLED}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_CONFIDENCE_THRESHOLD=${GEMINI_CONFIDENCE_THRESHOLD}
      - HEADLESS=${HEADLESS}
      - PROFILE_DIR=${PROFILE_DIR}
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
      - ALL_PROXY=${ALL_PROXY}
      - NO_PROXY=${NO_PROXY}
    volumes:
      - backend_data:/app/data
      - backend_session:/app/session
    restart: unless-stopped
    networks:
      - dokploy-network
    dns:
      - 1.1.1.1
      - 8.8.8.8

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: rezeki1/ig-scraper-frontend:latest
    container_name: ig-scraper-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - INTERNAL_API_URL=${INTERNAL_API_URL}
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
      - ALL_PROXY=${ALL_PROXY}
      - NO_PROXY=${NO_PROXY}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - dokploy-network
    dns:
      - 1.1.1.1
      - 8.8.8.8

networks:
  dokploy-network:
    external: true

volumes:
  backend_data:
  backend_session: